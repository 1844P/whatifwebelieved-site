[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/*.(js|css)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for images
[[headers]]
  for = "/*.(jpg|jpeg|png|gif|svg|ico|webp)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for fonts
[[headers]]
  for = "/*.(woff|woff2|ttf|eot)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No caching for HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

# API endpoints
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"